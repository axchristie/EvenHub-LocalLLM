<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 216" width="216" height="216">
  <rect width="216" height="216" rx="40" fill="#1a1a1a"/>

  <!-- Outer chip square -->
  <rect x="58" y="58" width="100" height="100" rx="8"
        fill="none" stroke="#e8e8e8" stroke-width="6"/>

  <!-- Inner chip square -->
  <rect x="80" y="80" width="56" height="56" rx="4"
        fill="none" stroke="#e8e8e8" stroke-width="5"/>

  <!-- Pins — top -->
  <line x1="84" y1="58" x2="84" y2="40" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="108" y1="58" x2="108" y2="40" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="58" x2="132" y2="40" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>

  <!-- Pins — bottom -->
  <line x1="84" y1="158" x2="84" y2="176" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="108" y1="158" x2="108" y2="176" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="158" x2="132" y2="176" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>

  <!-- Pins — left -->
  <line x1="58" y1="84" x2="40" y2="84" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="58" y1="108" x2="40" y2="108" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="58" y1="132" x2="40" y2="132" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>

  <!-- Pins — right -->
  <line x1="158" y1="84" x2="176" y2="84" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="158" y1="108" x2="176" y2="108" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
  <line x1="158" y1="132" x2="176" y2="132" stroke="#e8e8e8" stroke-width="5" stroke-linecap="round"/>
</svg>
