<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">

  <!-- Background -->
  <rect width="24" height="24" fill="#1a1a1a"/>

  <!-- Chip outer square -->
  <rect x="5" y="5" width="14" height="14" rx="2"
        fill="none" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- Pins — top -->
  <line x1="9"  y1="5" x2="9"  y2="2" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="5" x2="15" y2="2" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pins — bottom -->
  <line x1="9"  y1="19" x2="9"  y2="22" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="19" x2="15" y2="22" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pins — left -->
  <line x1="5" y1="9"  x2="2" y2="9"  stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="5" y1="15" x2="2" y2="15" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pins — right -->
  <line x1="19" y1="9"  x2="22" y2="9"  stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="15" x2="22" y2="15" stroke="#e8e8e8" stroke-width="1.5" stroke-linecap="round"/>

</svg>
